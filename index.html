<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WORLD FILE SYSTEM</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: Arial;
  color: white;
}

/* 🪟 전체 창 */
.window {
  width: 90%;
  max-width: 1000px;
  margin: 40px auto;
  border: 2px solid #333;
  border-radius: 10px;
  background: #141414;
  overflow: hidden;
}

/* 상단 바 */
.titlebar {
  background: #222;
  padding: 10px 15px;
  font-weight: bold;
}

/* 📁 내부 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

/* 🗂️ 파일 카드 */
.file {
  background: #1f1f1f;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 15px;
  cursor: pointer;
  transition: 0.2s;

  /* 👉 파일 느낌 핵심 */
  position: relative;
  overflow: hidden;
}

/* 폴더 탭처럼 보이는 윗부분 */
.file::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 40px;
  height: 10px;
  background: #444;
  border-bottom-right-radius: 5px;
}

/* hover 효과 */
.file:hover {
  transform: translateY(-3px);
  background: #2a2a2a;
  border-color: #666;
}

/* 아이콘 */
.icon {
  font-size: 35px;
  margin-top: 10px;
}

/* 이름 */
.name {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}
</style>

</head>

<body>

<div class="window">

  <div class="titlebar">
    📁 WORLD FILE SYSTEM
  </div>

  <div class="grid">

    <div class="file">
      <div class="icon">🗂️</div>
      <div class="name">캐릭터 A</div>
    </div>

    <div class="file">
      <div class="icon">🗂️</div>
      <div class="name">캐릭터 B</div>
    </div>

    <div class="file">
      <div class="icon">🗂️</div>
      <div class="name">세계관 설정</div>
    </div>

    <div class="file">
      <div class="icon">🗂️</div>
      <div class="name">조직</div>
    </div>

    <div class="file">
      <div class="icon">🗂️</div>
      <div class="name">이벤트 기록</div>
    </div>

    <div class="file">
      <div class="icon">🗂️</div>
      <div class="name">비밀 문서</div>
    </div>

  </div>

</div>

</body>
</html>
