<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FABLE LAB ARCHIVE</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #e6e6e6;
  font-family: "Courier New", monospace;
}

/* 📁 메인 화면 */
.archive {
  padding: 50px;
}

/* 파일 리스트 */
.file {
  padding: 10px;
  border-bottom: 1px solid #222;
  cursor: pointer;
}

.file:hover {
  background: #111;
}

/* 📄 문서 */
.doc {
  display: none;
  padding: 40px;
  max-width: 700px;
  margin: auto;
  background: #f4f1e6;
  color: #111;
  font-family: "Times New Roman", serif;
  border: 2px solid #ccc;
}

/* 이미지 */
.doc img {
  width: 140px;
  float: right;
  margin-left: 20px;
  border: 1px solid #333;
}
</style>

</head>

<body>

<!-- 📁 리스트 -->
<div id="list" class="archive">

<h1>FABLE LAB ARCHIVE</h1>

<div class="file" onclick="openDoc('lee')">FILE-001 : 이상</div>
<div class="file" onclick="openDoc('yoon')">FILE-002 : 윤동주</div>
<div class="file">FILE-003 : CLASSIFIED</div>
<div class="file">FILE-004 : CLASSIFIED</div>
<div class="file">FILE-005 : CLASSIFIED</div>
<div class="file">FILE-006 : CLASSIFIED</div>

</div>

<!-- 📄 문서 -->
<div id="doc" class="doc"></div>

<script>

function openDoc(name) {

let content = "";

if(name === "lee") {
content = `
<h2>FILE-001 : 이상</h2>
<img src="https://raw.githubusercontent.com/ryugy2010-hue/Webtoon/main/lee.webp">
<p><b>이름:</b> 이상</p>
<p><b>나이:</b> 미상</p>
<p><b>소속:</b> 연구소 제3연구실</p>
<p><b>특이사항:</b> 전생 기억 보유</p>
<p><b>능력:</b> [날개] - 하루 1회 완전 회복</p>
`;
}

if(name === "yoon") {
content = `
<h2>FILE-002 : 윤동주</h2>
<img src="https://raw.githubusercontent.com/ryugy2010-hue/Webtoon/main/yoon.webp">
<p><b>이름:</b> 윤동주</p>
<p><b>나이:</b> 미상</p>
<p><b>소속:</b> 연구소 제3연구실</p>
<p><b>특이사항:</b> 전생 기억 보유</p>
<p><b>능력:</b> [서시] - 정신 공격 완전 면역</p>
`;
}

document.getElementById("list").style.display = "none";
document.getElementById("doc").style.display = "block";
document.getElementById("doc").innerHTML = content;
}

</script>

</body>
</html>
