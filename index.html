<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FABLE LAB SYSTEM</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050505;
  color: white;

  /* 🔬 연구실 느낌 도트 */
  background-image: radial-gradient(#151515 1px, transparent 1px);
  background-size: 10px 10px;
}

/* 🧪 전체 연구실 */
.room {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🖥️ 큰 컴퓨터 */
.monitor {
  width: 1000px;
  height: 600px;
  background: #0f0f0f;
  border: 8px solid #2a2a2a;
  border-radius: 15px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* 🧭 상단 바 (Replit 느낌 핵심) */
.topbar {
  background: #1c1c1c;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #333;
}

/* 버튼 */
.topbar button {
  background: #222;
  color: white;
  border: 1px solid #444;
  padding: 5px 10px;
  cursor: pointer;
}

/* 📺 화면 */
.screen {
  flex: 1;
  display: none;
  padding: 20px;
}

.screen.active {
  display: block;
}

/* 🖥️ 데스크톱 아이콘 */
.desktop {
  display: grid;
  grid-template-columns: repeat(3, 130px);
  gap: 25px;
  padding: 20px;
}

/* 🟨 파일 아이콘 (진짜 OS 느낌) */
.file {
  width: 110px;
  height: 110px;
  background: #f1c40f;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 5px 0 #b7950b;
  transition: 0.2s;
  color: black;
  font-weight: bold;
}

.file:hover {
  transform: translateY(-3px);
}

/* 📄 문서 */
.doc {
  background: #111;
  padding: 20px;
  border: 1px solid #333;
}
</style>

</head>

<body>

<div class="room">

<div class="monitor">

<!-- 🧭 TOP BAR -->
<div class="topbar">
  <div>FABLE LAB</div>
  <div>
    <button onclick="show('home')">FILES</button>
    <button onclick="show('world')">WORLD</button>
    <button onclick="back()">BACK</button>
  </div>
</div>

<!-- 🖥️ 메인 화면 -->
<div id="home" class="screen active">
  <div class="desktop">

    <div class="file" onclick="openChar('A')">🗂️ A</div>
    <div class="file" onclick="openChar('B')">🗂️ B</div>
    <div class="file" onclick="openChar('C')">🗂️ C</div>
    <div class="file" onclick="openChar('D')">🗂️ D</div>
    <div class="file" onclick="openChar('E')">🗂️ E</div>
    <div class="file" onclick="openChar('F')">🗂️ F</div>

  </div>
</div>

<!-- 📂 캐릭터 화면 -->
<div id="char" class="screen">
  <div class="doc" id="charContent">
    캐릭터 정보
  </div>
</div>

<!-- 📜 세계관 화면 -->
<div id="world" class="screen">
  <div class="doc">
    <h2>WORLD FILE</h2>
    <p>연구소 기록 / 세계관 설정</p>
  </div>
</div>

</div>

</div>

<script>

let current = "home";

/* 화면 전환 */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  current = id;
}

/* 캐릭터 열기 */
function openChar(name) {
  document.getElementById('charContent').innerHTML =
    `<h2>CHARACTER `+name+`</h2><p>여기에 설정 입력</p>`;

  show('char');
}

/* 뒤로가기 */
function back() {
  show('home');
}

</script>

</body>
</html>
