<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FABLE LAB</title>

<style>
body {
  margin: 0;
  background: #050505;
  font-family: Arial;
  color: white;

  /* 🌑 연구실 도트 배경 */
  background-image: radial-gradient(#151515 1px, transparent 1px);
  background-size: 10px 10px;
}

/* 🧪 연구실 */
.room {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🖥️ 모니터 */
.monitor {
  width: 900px;
  height: 520px;
  background: #0f0f0f;
  border: 8px solid #2a2a2a;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(0,0,0,0.9);
  position: relative;
  overflow: hidden;
}

/* 상단 바 */
.menu {
  background: #1c1c1c;
  padding: 10px 15px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #333;
}

/* 🧭 화면 */
.screen {
  padding: 20px;
}

/* 🟨 아이콘 바탕화면 */
.desktop {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  gap: 25px;
  padding: 20px;
}

/* 🟨 폴더 아이콘 */
.icon {
  width: 100px;
  height: 80px;
  background: #f1c40f; /* 🔥 노란색 */
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 5px 0 #b7950b;
}

/* 폴더 윗탭 */
.icon::before {
  content: "";
  position: absolute;
  top: -8px;
  left: 10px;
  width: 40px;
  height: 12px;
  background: #d4ac0d;
  border-radius: 3px 3px 0 0;
}

/* hover 효과 */
.icon:hover {
  transform: translateY(-3px);
}

/* 이름 */
.label {
  text-align: center;
  margin-top: 5px;
  font-size: 12px;
}

/* 아이콘 전체 */
.item {
  display: flex;
  flex-direction: column;
  align-items: center;
}
</style>

</head>

<body>

<div class="room">

<div class="monitor">

<!-- 🧭 메뉴 -->
<div class="menu">
  <div>FABLE LAB SYSTEM</div>
  <div>
    <button onclick="show('home')">DESKTOP</button>
    <button onclick="show('world')">WORLD</button>
  </div>
</div>

<!-- 🖥️ 데스크톱 -->
<div id="home" class="screen">

  <div class="desktop">

    <div class="item" onclick="openChar('A')">
      <div class="icon"></div>
      <div class="label">A FILE</div>
    </div>

    <div class="item" onclick="openChar('B')">
      <div class="icon"></div>
      <div class="label">B FILE</div>
    </div>

    <div class="item" onclick="openChar('C')">
      <div class="icon"></div>
      <div class="label">C FILE</div>
    </div>

    <div class="item" onclick="openChar('D')">
      <div class="icon"></div>
      <div class="label">D FILE</div>
    </div>

    <div class="item" onclick="openChar('E')">
      <div class="icon"></div>
      <div class="label">E FILE</div>
    </div>

    <div class="item" onclick="openChar('F')">
      <div class="icon"></div>
      <div class="label">F FILE</div>
    </div>

  </div>

</div>

<!-- 📜 세계관 -->
<div id="world" class="screen" style="display:none;">
  <h2>WORLD FILE</h2>
  <p>여기에 세계관 문서 입력</p>
</div>

</div>

</div>

<script>

/* 화면 전환 */
function show(page) {
  document.getElementById('home').style.display = 'none';
  document.getElementById('world').style.display = 'none';

  document.getElementById(page).style.display = 'block';
}

/* 캐릭터 열기 */
function openChar(name) {
  document.getElementById('home').innerHTML = `
    <div style="padding:20px;">
      <h2>CHARACTER `+name+`</h2>
      <p>여기에 캐릭터 설명</p>
      <button onclick="location.reload()">← BACK</button>
    </div>
  `;
}

</script>

</body>
</html>
