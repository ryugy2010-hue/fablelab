<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FABLE LAB FILE SYSTEM</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;

  /* 🌑 연구실 배경 */
  background: url("https://raw.githubusercontent.com/ryugy2010-hue/Webtoon/main/IMG_0623.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* 어두운 오버레이 */
.overlayDark {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

/* 🖥️ 파일 화면 */
.desktop {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: repeat(3, 140px);
  gap: 25px;
  padding: 60px;
}

/* 📁 파일 아이콘 */
.file {
  width: 120px;
  height: 120px;
  background: rgba(255, 215, 0, 0.9);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-weight: bold;
  color: black;
  box-shadow: 0 6px 0 #b7950b;
  transition: 0.2s;
}

.file:hover {
  transform: translateY(-4px);
}

/* 🧾 보고서 창 */
.report {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 420px;
  background: #f5f1e6;
  color: #111;
  padding: 25px;
  border: 2px solid #c9c2a6;
  box-shadow: 0 0 30px rgba(0,0,0,0.7);
  display: none;
  overflow-y: auto;
  font-family: "Times New Roman", serif;
}

/* 사진 */
.report img {
  width: 120px;
  height: 150px;
  object-fit: cover;
  border: 2px solid #333;
  float: right;
  margin-left: 15px;
}

/* 닫기 */
.closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="overlayDark"></div>

<!-- 🖥️ 파일 6개 -->
<div class="desktop">

  <div class="file" onclick="openChar('lee')">🗂 이상</div>
  <div class="file" onclick="openChar('yoon')">🗂 윤동주</div>
  <div class="file" onclick="openChar('c3')">🗂 FILE 3</div>
  <div class="file" onclick="openChar('c4')">🗂 FILE 4</div>
  <div class="file" onclick="openChar('c5')">🗂 FILE 5</div>
  <div class="file" onclick="openChar('c6')">🗂 FILE 6</div>

</div>

<!-- 📄 보고서 창 -->
<div id="report" class="report">
  <div class="closeBtn" onclick="closeReport()">✖</div>
  <div id="content"></div>
</div>

<script>

function openChar(name) {

  let data = "";

  if(name === "lee") {
    data = `
      <h2>인사 보고서 - 이상</h2>
      <img src="https://raw.githubusercontent.com/ryugy2010-hue/Webtoon/main/lee.webp">
      <p><b>이름:</b> 이상</p>
      <p><b>나이:</b> 미상</p>
      <p><b>소속:</b> 연구소 제3연구실</p>
      <p><b>특이사항:</b> 전생기억보유</p>
      <p><b>능력:</b> [날개] - 순간적으로 몸의 모든 것을 회복. 하루 1회 사용.</p>
    `;
  }

  if(name === "yoon") {
    data = `
      <h2>인사 보고서 - 윤동주</h2>
      <img src="https://raw.githubusercontent.com/ryugy2010-hue/Webtoon/main/yoon.webp">
      <p><b>이름:</b> 윤동주</p>
      <p><b>나이:</b> 미상</p>
      <p><b>소속:</b> 연구소 제3연구실</p>
      <p><b>특이사항:</b> 전생기억보유</p>
      <p><b>능력:</b> [서시] - 모든 정신공격 완전면역</p>
    `;
  }

  document.getElementById("content").innerHTML = data;
  document.getElementById("report").style.display = "block";
}

function closeReport() {
  document.getElementById("report").style.display = "none";
}

</script>

</body>
</html>
