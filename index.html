<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FABLE LAB</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: Arial;
  color: white;

  /* 🧩 도트 느낌 배경 */
  background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
  background-size: 10px 10px;
}

/* 🧪 연구실 공간 */
.room {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🖥️ 모니터 */
.monitor {
  width: 800px;
  height: 500px;
  background: #111;
  border: 8px solid #333;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  position: relative;
}

/* 화면 */
.screen {
  padding: 20px;
}

/* 파일 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

/* 📁 파일 */
.file {
  background: #1f1f1f;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.file:hover {
  transform: scale(1.05);
  background: #2a2a2a;
}
</style>

</head>

<body>

<div class="room">

  <div class="monitor">

    <div class="screen">

      <h3>FABLE LAB SYSTEM</h3>

      <div class="grid">

        <div class="file" onclick="openChar('A')">🗂️ 캐릭터 A</div>
        <div class="file" onclick="openChar('B')">🗂️ 캐릭터 B</div>
        <div class="file" onclick="openChar('C')">🗂️ 캐릭터 C</div>
        <div class="file" onclick="openChar('D')">🗂️ 캐릭터 D</div>
        <div class="file" onclick="openChar('E')">🗂️ 캐릭터 E</div>
        <div class="file" onclick="openChar('F')">🗂️ 캐릭터 F</div>

      </div>

    </div>

  </div>

</div>

<script>
function openChar(name) {
  window.location.href = name + ".html";
}
</script>

</body>
</html>
